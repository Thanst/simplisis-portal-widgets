<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Frigya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     Ask Frigya — Widget Styles
     ============================================================ */
  :root {
    --cypress-green: #008595;
    --cypress-green-dark: #006d7a;
    --cypress-green-light: #e6f3f5;
    --siyez-yellow: #DAC263;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9a9a9a;
    --border-light: #ececec;
    --border-medium: #d4d4d4;
    --bg-white: #ffffff;
    --bg-subtle: #fafafa;
    --bg-hover: #f5f5f5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-white);
    color: var(--text-primary);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .widget {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 100%;
  }

  /* ============================================================
     HEADER
     ============================================================ */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-light);
    background: var(--bg-white);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Logo container — Siyez Yellow brand color */
  .logomark-wrap {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: #008595;
    border-radius: 8px;
    padding: 5px; 
  }

  .logomark {
    width: 100%;
    height: 100%;
    /* CSS filter to convert Cypress Green SVG → Siyez Yellow (#DAC263) */
    /* Filter calculated to map source green to target yellow */
    filter: brightness(0) saturate(100%) invert(82%) sepia(35%) saturate(531%) hue-rotate(13deg) brightness(91%) contrast(82%);
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .header-subtitle {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border-medium);
    color: var(--text-secondary);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .clear-btn:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }

  /* ============================================================
     MESSAGES AREA
     ============================================================ */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .message-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }

  .message.user .message-label {
    color: var(--text-secondary);
  }

  .message.assistant .message-label {
    color: var(--cypress-green);
  }

  .message-body {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-primary);
    word-wrap: break-word;
  }

  .message-body p { margin-bottom: 0.6em; }
  .message-body p:last-child { margin-bottom: 0; }
  .message-body ul, .message-body ol { margin: 0.4em 0 0.6em 1.2em; }
  .message-body li { margin-bottom: 0.3em; }
  .message-body strong { font-weight: 600; }
  .message-body em { font-style: italic; }

  /* ============================================================
     LINKS — clickable, styled
     ============================================================ */
  .message-body a {
    color: var(--cypress-green);
    text-decoration: none;
    border-bottom: 1px solid var(--cypress-green-light);
    transition: all 0.15s;
    font-weight: 500;
  }

  .message-body a:hover {
    border-bottom-color: var(--cypress-green);
    background: var(--cypress-green-light);
  }

  .message-body a::after {
    content: ' ↗';
    font-size: 0.85em;
    opacity: 0.6;
  }

  /* ============================================================
     LOADING DOTS
     ============================================================ */
  .loading {
    display: flex;
    gap: 4px;
    padding: 8px 0;
  }

  .loading-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-tertiary);
    animation: pulse 1.4s infinite;
  }

  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 60%, 100% { opacity: 0.3; }
    30% { opacity: 1; }
  }

  /* ============================================================
     SUGGESTIONS
     ============================================================ */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 20px 12px;
    flex-shrink: 0;
  }

  .suggestion-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-white);
    border: 1px solid var(--border-light);
    color: var(--text-secondary);
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 18px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .suggestion-btn:hover {
    border-color: var(--cypress-green);
    color: var(--cypress-green);
    background: var(--bg-white);
  }

  .suggestion-btn svg {
    width: 14px;
    height: 14px;
    stroke-width: 1.5;
  }

  /* ============================================================
     INPUT AREA
     ============================================================ */
  .input-area {
    padding: 12px 20px 20px;
    border-top: 1px solid var(--border-light);
    background: var(--bg-white);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--bg-subtle);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    padding: 10px 12px;
    transition: border-color 0.15s;
  }

  .input-wrap:focus-within {
    border-color: var(--cypress-green);
    background: var(--bg-white);
  }

  textarea {
    flex: 1;
    border: none;
    background: transparent;
    resize: none;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    color: var(--text-primary);
    outline: none;
    max-height: 120px;
    min-height: 22px;
  }

  textarea::placeholder { color: var(--text-tertiary); }

  .send-btn {
    background: var(--cypress-green);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .send-btn:hover:not(:disabled) { background: var(--cypress-green-dark); }
  .send-btn:disabled { background: var(--border-medium); cursor: not-allowed; }

  .send-btn svg { width: 16px; height: 16px; }

  /* ============================================================
     SCROLLBAR
     ============================================================ */
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb {
    background: var(--border-medium);
    border-radius: 3px;
  }
  .messages::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }
</style>
</head>
<body>

<div class="widget">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="logomark-wrap">
        <img class="logomark" src="https://assets.super.so/d1eb9130-5791-4a8f-be17-c8c9d8adb86f/images/ff532fa7-e040-4120-bca3-dff99e61cb05/logomark_cypress_green.svg" alt="Frigya">
      </div>
      <div>
        <div class="header-title">Ask Frigya</div>
        <div class="header-subtitle">Brand assistant</div>
      </div>
    </div>
    <button class="clear-btn" id="clearBtn" title="Start fresh conversation">Clear</button>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages"></div>

  <!-- SUGGESTIONS (hidden after first message) -->
  <div class="suggestions" id="suggestions">
    <button class="suggestion-btn" data-prompt="Write an Instagram caption for a Siyez wheat breakfast photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Write a caption
    </button>
    <button class="suggestion-btn" data-prompt="What are Frigya's brand colours?">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
      Brand colours
    </button>
    <button class="suggestion-btn" data-prompt="Send me the Canva templates">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Canva templates
    </button>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Ask me anything about the brand..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
// ============================================================================
// CONFIG
// ============================================================================
const WORKER_URL = 'https://ask-frigya.thoetphong.workers.dev';
const STORAGE_KEY = 'frigya_chat_history';
const INTERNAL_DOMAIN = 'simplisisdesign.com';

// ============================================================================
// STATE
// ============================================================================
let messages = [];
let isLoading = false;

// ============================================================================
// DOM REFS
// ============================================================================
const $messages = document.getElementById('messages');
const $input = document.getElementById('input');
const $sendBtn = document.getElementById('sendBtn');
const $clearBtn = document.getElementById('clearBtn');
const $suggestions = document.getElementById('suggestions');

// ============================================================================
// STORAGE — localStorage persistence
// ============================================================================
function saveHistory() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
  } catch (e) {
    console.warn('localStorage save failed:', e);
  }
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) {
    console.warn('localStorage load failed:', e);
    return [];
  }
}

function clearHistory() {
  messages = [];
  localStorage.removeItem(STORAGE_KEY);
  $messages.innerHTML = '';
  $suggestions.style.display = 'flex';
}

// ============================================================================
// MARKDOWN PARSER (links, bold, italic, lists, paragraphs)
// ============================================================================
function escapeHtml(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderMarkdown(text) {
  let html = escapeHtml(text);

  // Markdown links: [text](url) → <a> with smart target
  // Internal (*.simplisisdesign.com) → target="_top" (parent window, same tab)
  // External → target="_blank" (new tab)
  html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (match, label, url) => {
    const isInternal = url.includes(INTERNAL_DOMAIN);
    if (isInternal) {
      return `<a href="${url}" target="_top">${label}</a>`;
    } else {
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`;
    }
  });

  // Defensive: auto-link bare URLs (in case AI still outputs raw URL)
  html = html.replace(
    /(?<!["'>=])(https?:\/\/[^\s<]+)/g,
    (url) => {
      const isInternal = url.includes(INTERNAL_DOMAIN);
      const target = isInternal ? '_top' : '_blank';
      const rel = isInternal ? '' : ' rel="noopener noreferrer"';
      return `<a href="${url}" target="${target}"${rel}>${url}</a>`;
    }
  );

  // Bold: **text** → <strong>
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Italic: *text* → <em>
  html = html.replace(/(?<!\*)\*(?!\*)([^*\n]+)\*(?!\*)/g, '<em>$1</em>');

  // Bullet lists
  const lines = html.split('\n');
  const result = [];
  let inList = false;

  for (const line of lines) {
    const bulletMatch = line.match(/^[\-\*]\s+(.+)$/);
    if (bulletMatch) {
      if (!inList) {
        result.push('<ul>');
        inList = true;
      }
      result.push(`<li>${bulletMatch[1]}</li>`);
    } else {
      if (inList) {
        result.push('</ul>');
        inList = false;
      }
      if (line.trim() === '') {
        result.push('');
      } else {
        result.push(line);
      }
    }
  }
  if (inList) result.push('</ul>');

  html = result.join('\n');

  // Wrap blocks in <p>
  const blocks = html.split(/\n\s*\n/);
  html = blocks.map(b => {
    const trimmed = b.trim();
    if (!trimmed) return '';
    if (trimmed.startsWith('<ul>') || trimmed.startsWith('<ol>')) return trimmed;
    return `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
  }).join('');

  return html;
}

// ============================================================================
// RENDER
// ============================================================================
function renderMessage(role, content) {
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = role === 'user' ? 'YOU' : 'FRIGYA';

  const body = document.createElement('div');
  body.className = 'message-body';
  body.innerHTML = renderMarkdown(content);

  wrap.appendChild(label);
  wrap.appendChild(body);
  $messages.appendChild(wrap);
  scrollToBottom();
}

function renderLoading() {
  const wrap = document.createElement('div');
  wrap.className = 'message assistant';
  wrap.id = 'loading-msg';

  const label = document.createElement('div');
  label.className = 'message-label';
  label.textContent = 'FRIGYA';

  const loading = document.createElement('div');
  loading.className = 'loading';
  loading.innerHTML = '<div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>';

  wrap.appendChild(label);
  wrap.appendChild(loading);
  $messages.appendChild(wrap);
  scrollToBottom();
}

function removeLoading() {
  const el = document.getElementById('loading-msg');
  if (el) el.remove();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    $messages.scrollTop = $messages.scrollHeight;
  });
}

// ============================================================================
// API CALL — parses Anthropic API response shape
// ============================================================================
async function sendMessage(userText) {
  if (isLoading || !userText.trim()) return;

  $suggestions.style.display = 'none';

  const userMsg = { role: 'user', content: userText.trim() };
  messages.push(userMsg);
  renderMessage('user', userText.trim());
  saveHistory();

  isLoading = true;
  $sendBtn.disabled = true;
  renderLoading();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
    });

    removeLoading();

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`API error (${res.status}): ${errText}`);
    }

    const data = await res.json();

    // Worker returns the full Anthropic API response.
    // Extract text from content array.
    let reply = '';
    if (data.content && Array.isArray(data.content)) {
      reply = data.content
        .filter(block => block.type === 'text')
        .map(block => block.text)
        .join('\n');
    } else if (data.error) {
      throw new Error(data.error);
    }

    if (!reply) reply = 'Sorry, I could not generate a response.';

    const assistantMsg = { role: 'assistant', content: reply };
    messages.push(assistantMsg);
    renderMessage('assistant', reply);
    saveHistory();
  } catch (err) {
    removeLoading();
    const errMsg = `Sorry, something went wrong. ${err.message}`;
    renderMessage('assistant', errMsg);
    console.error(err);
  } finally {
    isLoading = false;
    updateSendButton();
  }
}

// ============================================================================
// INPUT HANDLERS
// ============================================================================
function updateSendButton() {
  $sendBtn.disabled = isLoading || !$input.value.trim();
}

function autoResize() {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
}

$input.addEventListener('input', () => {
  updateSendButton();
  autoResize();
});

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = $input.value;
    if (text.trim() && !isLoading) {
      $input.value = '';
      autoResize();
      updateSendButton();
      sendMessage(text);
    }
  }
});

$sendBtn.addEventListener('click', () => {
  const text = $input.value;
  if (text.trim() && !isLoading) {
    $input.value = '';
    autoResize();
    updateSendButton();
    sendMessage(text);
  }
});

$clearBtn.addEventListener('click', () => {
  if (messages.length === 0) return;
  if (confirm('Clear conversation history?')) {
    clearHistory();
  }
});

// Suggestion buttons
document.querySelectorAll('.suggestion-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const prompt = btn.dataset.prompt;
    sendMessage(prompt);
  });
});

// ============================================================================
// INIT — Restore history on load
// ============================================================================
function init() {
  const saved = loadHistory();
  if (saved.length > 0) {
    messages = saved;
    $suggestions.style.display = 'none';
    saved.forEach(m => renderMessage(m.role, m.content));
  }
}

init();
</script>

</body>
</html>
