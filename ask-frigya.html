<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Frigya</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Frigya Brand Colors */
    --cypress: #008595;
    --cypress-dark: #006B78;
    --siyez: #DAC263;
    --phrygian-red: #9A452F;
    --poppy: #E5C9AB;
    --sky: #C5CFD8;
    --tuff: #FDEFBC;
    --clay: #BB7B3B;

    /* Neutrals — match Super.so */
    --bg: #FFFFFF;
    --text: #37352F;
    --text-soft: #787774;
    --text-muted: #9B9A97;
    --border: #EBEBEA;
    --border-soft: #F1F1EF;
    --hover: #F7F7F5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 32px 32px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logomark {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    display: block;
  }

  h1 {
    font-weight: 600;
    font-size: 24px;
    color: var(--text);
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--text-soft);
    font-size: 14px;
    font-weight: 400;
  }

  /* Chat container */
  .chat {
    flex: 1;
    margin-bottom: 16px;
    min-height: 280px;
    overflow-y: auto;
    padding: 4px 2px;
  }

  .chat::-webkit-scrollbar { width: 6px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Welcome state */
  .welcome {
    text-align: center;
    padding: 24px 0 8px;
  }

  .welcome-text {
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.6;
    max-width: 440px;
    margin: 0 auto 28px;
  }

  /* Suggested prompts */
  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 480px;
    margin: 0 auto;
  }

  .suggestion {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    transition: all 0.15s ease;
    line-height: 1.5;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .suggestion:hover {
    background: var(--hover);
    border-color: var(--text-muted);
  }

  .suggestion-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    opacity: 0.5;
  }

  /* Messages */
  .message {
    margin-bottom: 24px;
    animation: fadeIn 0.25s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-user {
    display: flex;
    justify-content: flex-end;
  }

  .message-user .bubble {
    background: var(--cypress);
    color: white;
    padding: 10px 16px;
    border-radius: 16px 16px 4px 16px;
    max-width: 80%;
    font-size: 14.5px;
    line-height: 1.5;
  }

  .message-assistant .meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    padding-left: 4px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }

  .message-assistant .bubble {
    background: var(--bg);
    color: var(--text);
    padding: 0 4px;
    font-size: 14.5px;
    line-height: 1.65;
    white-space: pre-wrap;
  }

  /* Loading */
  .typing {
    display: inline-flex;
    gap: 4px;
    padding: 8px 4px;
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cypress);
    animation: bounce 1.4s infinite ease-in-out;
    opacity: 0.4;
  }

  .typing span:nth-child(2) { animation-delay: 0.16s; }
  .typing span:nth-child(3) { animation-delay: 0.32s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Input area */
  .input-area {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    transition: border-color 0.15s ease;
  }

  .input-area:focus-within {
    border-color: var(--cypress);
  }

  #input {
    flex: 1;
    border: none;
    outline: none;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    background: transparent;
    resize: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 1.5;
  }

  #input::placeholder {
    color: var(--text-muted);
  }

  #send {
    background: var(--cypress);
    color: white;
    border: none;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    transition: background 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #send:hover:not(:disabled) {
    background: var(--cypress-dark);
  }

  #send:disabled {
    background: var(--text-muted);
    cursor: not-allowed;
  }

  #send svg {
    width: 16px;
    height: 16px;
  }

  /* Top bar */
  .top-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 12px;
    min-height: 28px;
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s ease;
    display: none;
  }

  .reset-btn.visible {
    display: inline-block;
  }

  .reset-btn:hover {
    background: var(--hover);
    color: var(--text-soft);
  }

  /* Footer */
  .footer-note {
    text-align: center;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border-soft);
    font-size: 12px;
    color: var(--text-muted);
  }

  .footer-note a {
    color: var(--text-soft);
    text-decoration: none;
  }

  .footer-note a:hover {
    text-decoration: underline;
  }

  @media (max-width: 600px) {
    .app { padding: 32px 20px 24px; }
    h1 { font-size: 20px; }
    .logomark { width: 56px; height: 56px; }
  }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <img class="logomark" src="https://assets.super.so/d1eb9130-5791-4a8f-be17-c8c9d8adb86f/images/ff532fa7-e040-4120-bca3-dff99e61cb05/logomark_cypress_green.svg" alt="Frigya">
    <h1>Ask Frigya</h1>
    <p class="subtitle">Your brand voice assistant</p>
  </div>

  <div class="top-bar">
    <button class="reset-btn" id="reset" onclick="resetChat()">Start over</button>
  </div>

  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <p class="welcome-text">
        Need help writing on-brand? I can draft captions, welcome messages, check tone of voice, or answer questions about the Frigya brand.
      </p>

      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion('Write an Instagram caption for our morning Kahvaltı breakfast — feature Siyez bread and our valley view.')">
          <svg class="suggestion-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 5h10M3 8h10M3 11h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Write an Instagram caption for Kahvaltı breakfast
        </button>
        <button class="suggestion" onclick="sendSuggestion('Draft a warm welcome message for a guest checking in for the first time.')">
          <svg class="suggestion-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 1.5L9.5 5.5L13.5 5.5L10.5 8L11.5 12L8 9.5L4.5 12L5.5 8L2.5 5.5L6.5 5.5L8 1.5Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
          Draft a welcome message for a new guest
        </button>
        <button class="suggestion" onclick="sendSuggestion('When should I use Cypress Green vs Phrygian Red? Give me practical examples.')">
          <svg class="suggestion-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="5" cy="8" r="3.5" stroke="currentColor" stroke-width="1.3"/>
            <circle cx="11" cy="8" r="3.5" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          When to use Cypress Green vs Phrygian Red
        </button>
        <button class="suggestion" onclick="sendSuggestion('Suggest 3 ways to describe our cypress trees that match our brand voice.')">
          <svg class="suggestion-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 2L5 6h2L4.5 10h3L5 14h6l-2.5-4h3L11 6h2L8 2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
          Describe our cypress trees, on-brand
        </button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Ask Frigya anything about the brand…" rows="1"></textarea>
    <button id="send" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 8L14 2L8 14L6.5 9.5L2 8Z" fill="currentColor"/>
      </svg>
    </button>
  </div>

  <div class="footer-note">
    Powered by <a href="https://www.simplisisdesign.com" target="_blank">Simplisis</a> · For Frigya Organik internal use
  </div>

</div>

<script>
  // 🔗 Cloudflare Worker endpoint
  const WORKER_URL = 'https://ask-frigya.thoetphong.workers.dev';

  let conversationHistory = [];
  let isLoading = false;
  const chatEl = document.getElementById('chat');
  const welcomeEl = document.getElementById('welcome');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const resetBtn = document.getElementById('reset');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendSuggestion(text) {
    inputEl.value = text;
    sendMessage();
  }

  function addUserMessage(text) {
    if (welcomeEl) welcomeEl.style.display = 'none';
    resetBtn.classList.add('visible');
    const div = document.createElement('div');
    div.className = 'message message-user';
    div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addAssistantMessage(text) {
    const div = document.createElement('div');
    div.className = 'message message-assistant';
    div.innerHTML = `
      <div class="meta">FRIGYA</div>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'message message-assistant';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="meta">FRIGYA</div>
      <div class="typing"><span></span><span></span><span></span></div>
    `;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function resetChat() {
    conversationHistory = [];
    chatEl.innerHTML = '';
    if (welcomeEl) {
      welcomeEl.style.display = 'block';
      chatEl.appendChild(welcomeEl);
    }
    resetBtn.classList.remove('visible');
    inputEl.focus();
  }

  async function sendMessage() {
    if (isLoading) return;
    const text = inputEl.value.trim();
    if (!text) return;

    isLoading = true;
    sendBtn.disabled = true;

    addUserMessage(text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    conversationHistory.push({ role: 'user', content: text });
    showTyping();

    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });

      const data = await response.json();
      removeTyping();

      if (data.error || data.type === 'error') {
        const errMsg = data.error?.message || data.error || 'Unknown error';
        addAssistantMessage("Something went wrong. " + errMsg);
        conversationHistory.pop();
        return;
      }

      const reply = data.content
        ?.filter(b => b.type === 'text')
        .map(b => b.text)
        .join('\n') || '';

      if (reply) {
        addAssistantMessage(reply);
        conversationHistory.push({ role: 'assistant', content: reply });
      } else {
        addAssistantMessage("I couldn't generate a response. Please try again.");
        conversationHistory.pop();
      }
    } catch (err) {
      removeTyping();
      addAssistantMessage("Connection issue. Please try again in a moment.\n\n" + err.message);
      conversationHistory.pop();
      console.error(err);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  inputEl.focus();
</script>

</body>
</html>
